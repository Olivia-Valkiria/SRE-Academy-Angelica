# -----------------------------------------------
# cAdvisor DaemonSet and Service Manifest
# Description: Deploys cAdvisor as a DaemonSet to monitor
# all nodes in the 'monitoring' namespace and exposes it via a ClusterIP service.
# -----------------------------------------------

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: monitoring          
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.47.0
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: false
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: run
          hostPath:
            path: /run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker

# -----------------------------------------------
# cAdvisor Service Manifest
# Description: Exposes the cAdvisor DaemonSet via a ClusterIP service.
# -----------------------------------------------

---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor-service
  namespace: monitoring         
  labels:
    app: cadvisor
spec:
  selector:
    app: cadvisor
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
  type: ClusterIP
  